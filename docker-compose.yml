services:
  mysql:
    image: mysql:8.0
    container_name: expense-track-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: expense_track
      MYSQL_USER: expense_user
      MYSQL_PASSWORD: expense_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: expense-track-api
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: expense_user
      DB_PASSWORD: expense_pass
      DB_NAME: expense_track
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: expense-track-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  mysql_data:
